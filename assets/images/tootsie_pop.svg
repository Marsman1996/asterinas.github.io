          <tspan font-family="Roboto Condensed" font-style="italic" font-size="16" fill="white" x="0" y="34" xml:space="preserve">the “hard candy shell”</tspan>
          <tspan font-family="Roboto Condensed" font-style="italic" font-size="16" fill="white" x="0" y="53" xml:space="preserve">ensures to be sound regarding the safe Rust calls</tspan>
